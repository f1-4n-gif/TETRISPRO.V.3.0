<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a0f;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(20, 20, 30, 0.8);
        }

        canvas {
            display: block;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--neon-blue);
        }

        .neon-text {
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-neon {
            transition: all 0.3s;
            border: 1px solid var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-neon:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* Mobile Controls */
        .touch-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        
        .touch-btn:active {
            background: var(--neon-purple);
        }

        #overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="flex flex-col md:flex-row gap-8 items-start">
        
        <!-- Left Side: Stats -->
        <div class="hidden md:flex flex-col gap-4 w-40">
            <div class="stats-card p-4 rounded-lg">
                <h3 class="text-xs text-gray-400 uppercase">Skor</h3>
                <p id="score" class="text-2xl font-orbitron neon-text text-cyan-400">0</p>
            </div>
            <div class="stats-card p-4 rounded-lg">
                <h3 class="text-xs text-gray-400 uppercase">Level</h3>
                <p id="level" class="text-2xl font-orbitron text-purple-400">1</p>
            </div>
            <div class="stats-card p-4 rounded-lg">
                <h3 class="text-xs text-gray-400 uppercase">Baris</h3>
                <p id="lines" class="text-2xl font-orbitron text-pink-400">0</p>
            </div>
        </div>

        <!-- Center: Game Board -->
        <div id="game-area" class="relative">
            <div id="game-container" class="rounded-lg overflow-hidden">
                <canvas id="tetris"></canvas>
            </div>

            <!-- Overlay Screen -->
            <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 z-10">
                <h1 id="overlay-title" class="text-4xl font-orbitron font-bold mb-4 neon-text text-cyan-400">TETRIS PRO</h1>
                <p id="overlay-msg" class="mb-8 text-gray-300">Gunakan panah untuk bergerak & putar</p>
                <button id="start-btn" class="btn-neon px-8 py-3 rounded-full font-bold">Mulai Game</button>
            </div>
        </div>

        <!-- Right Side: Preview & High Score -->
        <div class="flex flex-col gap-4 w-40">
            <div class="stats-card p-4 rounded-lg">
                <h3 class="text-xs text-gray-400 uppercase mb-2">Berikutnya</h3>
                <canvas id="next" width="100" height="100"></canvas>
            </div>
            <div class="stats-card p-4 rounded-lg">
                <h3 class="text-xs text-gray-400 uppercase">Terbaik</h3>
                <p id="high-score" class="text-xl font-orbitron text-yellow-400">0</p>
            </div>
            
            <!-- Mobile Stats (Hanya muncul di HP) -->
            <div class="md:hidden flex justify-between gap-2 mt-2">
                <div class="text-center">
                    <span class="text-[10px] block">SKOR</span>
                    <span id="score-mobile" class="text-cyan-400 font-bold">0</span>
                </div>
                <div class="text-center">
                    <span class="text-[10px] block">LVL</span>
                    <span id="level-mobile" class="text-purple-400 font-bold">1</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div class="grid grid-cols-3 gap-4 mt-8 md:hidden">
        <div></div>
        <div class="touch-btn" id="ctrl-up">Rotate</div>
        <div></div>
        <div class="touch-btn" id="ctrl-left">←</div>
        <div class="touch-btn" id="ctrl-down">↓</div>
        <div class="touch-btn" id="ctrl-right">→</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        const ROWS = 20;
        const COLS = 12;
        const BLOCK_SIZE = window.innerHeight < 700 ? 25 : 30;

        canvas.width = COLS * BLOCK_SIZE;
        canvas.height = ROWS * BLOCK_SIZE;

        context.scale(BLOCK_SIZE, BLOCK_SIZE);
        nextContext.scale(25, 25);

        // Piece Colors (Neon Palette)
        const COLORS = [
            null,
            '#00f2ff', // I - Cyan
            '#ff00ff', // T - Magenta
            '#ff8e0d', // L - Orange
            '#1322ff', // J - Blue
            '#ffe100', // O - Yellow
            '#00ff22', // S - Green
            '#ff0022', // Z - Red
        ];

        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [0, 3, 3],
                ];
            } else if (type === 'J') {
                return [
                    [0, 4, 0],
                    [0, 4, 0],
                    [4, 4, 0],
                ];
            } else if (type === 'O') {
                return [
                    [5, 5],
                    [5, 5],
                ];
            } else if (type === 'Z') {
                return [
                    [8, 8, 0],
                    [0, 8, 8],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 7, 7],
                    [7, 7, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 2, 0],
                    [2, 2, 2],
                    [0, 0, 0],
                ];
            }
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function drawMatrix(matrix, offset, ctx = context) {
            // Safety check: ensure matrix exists before iterating
            if (!matrix) return;
            
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Drawing Block with Glow & Border
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = COLORS[value];
                        ctx.fillStyle = COLORS[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Border
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Inner Highlight
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.8, 0.2);
                    }
                });
            });
        }

        function draw() {
            // Clear board
            context.fillStyle = '#0a0a0f';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid lines
            context.strokeStyle = 'rgba(255,255,255,0.05)';
            context.lineWidth = 0.02;
            for(let i=0; i<COLS; i++) {
                context.beginPath(); context.moveTo(i, 0); context.lineTo(i, ROWS); context.stroke();
            }
            for(let i=0; i<ROWS; i++) {
                context.beginPath(); context.moveTo(0, i); context.lineTo(COLS, i); context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0});
            
            // Only draw player and ghost if player matrix is initialized
            if (player.matrix) {
                drawMatrix(player.matrix, player.pos);
                
                // Ghost Piece (where it will land)
                const ghostPos = getGhostPosition();
                context.globalAlpha = 0.2;
                drawMatrix(player.matrix, ghostPos);
                context.globalAlpha = 1.0;
            }

            // Draw Next Piece if it exists
            if (player.next) {
                nextContext.fillStyle = '#14141e';
                nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
                const nextOffset = {
                    x: (nextCanvas.width / 25 - player.next.length) / 2,
                    y: (nextCanvas.height / 25 - player.next.length) / 2
                };
                drawMatrix(player.next, nextOffset, nextContext);
            }
        }

        function getGhostPosition() {
            if (!player.matrix) return player.pos;
            let ghostY = player.pos.y;
            while (!collide(arena, { ...player, pos: { x: player.pos.x, y: ghostY + 1 } })) {
                ghostY++;
            }
            return { x: player.pos.x, y: ghostY };
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            if (!m) return false;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
                
                if (player.lines % 10 === 0) {
                    player.level++;
                    dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
                }
            }
            updateScore();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (!player.next) {
                player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) -
                           (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameOver();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isPaused = true;

        function update(time = 0) {
            if(isPaused) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('score-mobile').innerText = player.score;
            document.getElementById('level').innerText = player.level;
            document.getElementById('level-mobile').innerText = player.level;
            document.getElementById('lines').innerText = player.lines;
            
            if (player.score > highScore) {
                highScore = player.score;
                localStorage.setItem('tetrisHighScore', highScore);
                document.getElementById('high-score').innerText = highScore;
            }
        }

        function gameOver() {
            isPaused = true;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay-title').innerText = "GAME OVER";
            document.getElementById('overlay-title').classList.replace('text-cyan-400', 'text-pink-600');
            document.getElementById('overlay-msg').innerText = `Skor Akhir: ${player.score}`;
            document.getElementById('start-btn').innerText = "Main Lagi";
        }

        const arena = createMatrix(COLS, ROWS);

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            next: null,
            score: 0,
            level: 1,
            lines: 0,
        };

        let highScore = localStorage.getItem('tetrisHighScore') || 0;
        document.getElementById('high-score').innerText = highScore;

        // Controls
        document.addEventListener('keydown', event => {
            if (isPaused) return;
            if (event.keyCode === 37) {
                playerMove(-1);
            } else if (event.keyCode === 39) {
                playerMove(1);
            } else if (event.keyCode === 40) {
                playerDrop();
            } else if (event.keyCode === 38) {
                playerRotate(1);
            } else if (event.keyCode === 32) {
                // Hard drop
                while(!collide(arena, player)) {
                    player.pos.y++;
                }
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
        });

        // Touch Controls
        document.getElementById('ctrl-left').onclick = () => !isPaused && playerMove(-1);
        document.getElementById('ctrl-right').onclick = () => !isPaused && playerMove(1);
        document.getElementById('ctrl-down').onclick = () => !isPaused && playerDrop();
        document.getElementById('ctrl-up').onclick = () => !isPaused && playerRotate(1);

        document.getElementById('start-btn').addEventListener('click', () => {
            // Reset Game
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            player.lines = 0;
            dropInterval = 1000;
            updateScore();
            playerReset();
            
            document.getElementById('overlay').style.display = 'none';
            isPaused = false;
            lastTime = performance.now();
            update();
        });

        // Initial Draw
        draw();
    </script>
</body>
</html>
